apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "k8s-operator.resourceName" (dict "suffix" "manager-role" "context" $) }}
rules:
- apiGroups:
  - compute.cloud.com
  resources:
  - ec2instances
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - compute.cloud.com
  resources:
  - ec2instances/finalizers
  verbs:
  - update
- apiGroups:
  - compute.cloud.com
  resources:
  - ec2instances/status
  verbs:
  - get
  - patch
  - update
