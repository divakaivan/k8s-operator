name: CI/CD

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check linter configuration
        run: make lint-config
      - name: Run linter
        run: make lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Running Tests
        run: |
          go mod tidy
          make test

  test-chart:
    name: Test Chart
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Install Helm
        run: make install-helm

      - name: Lint Helm Chart
        run: helm lint ./dist/chart

  build-and-push:
    name: Build and push image to DockerHub
    runs-on: ubuntu-latest
    needs: [test-chart, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: timee98642/ec2instance-k8s-operator:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Regenerate dist/install.yaml with correct image
        run: make build-installer IMG=timee98642/ec2instance-k8s-operator:latest

      - name: Commit updated dist/install.yaml and chart values
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add dist/install.yaml dist/chart/values.yaml
          git diff --cached --quiet || git commit -m "ci: update dist/install.yaml and chart values with latest image [skip ci]"
          git push

  publish-chart:
    name: Publish Helm chart to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Clone the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: dist
          charts_repo_url: "https://divakaivan.github.io/ec2instance-k8s-operator"
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
