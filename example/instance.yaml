apiVersion: compute.cloud.com/v1
kind: EC2Instance
metadata:
  name: k8s-obj-for-ec2
spec:
  amiId: "ami1234"
  sshKey: "my-ssh-key"
  instanceType: "t3.medium"
  subnet: "subnet-0342"
  tags:
    environment: "dev"
    owner: "alice"
  storage:
    size: 50
    type: "gp2"
  additionalStorage:
    - size: 100
      type: "io1"
    - size: 200
      type: "st1"
  instanceName: "my-ec2-instance"
